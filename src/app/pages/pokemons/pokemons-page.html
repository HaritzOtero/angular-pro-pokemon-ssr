<h1 class="text-3xl">Listado de Pokemons</h1>
<h2 class="text-xl">
  Página actual: {{currentPage() }}
</h2>
<hr class="my-2">

@if(pokemons()){
  <app-pokemon-list [pokemons]="pokemons()"></app-pokemon-list>
} @else {
  <pokemon-list-skeleton></pokemon-list-skeleton>
}

<div class="flex justify-between">

  <button (click)="loadPokemons(-1)" class="mt-2 cursor-pointer">
    Anteriores
  </button>

  <button (click)="loadPokemons(+1)" class="mt-2 cursor-pointer">
    Siguientes
  </button>

</div>
